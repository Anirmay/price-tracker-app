version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: price-tracker-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - price-tracker-network

  redis:
    image: redis:latest
    container_name: price-tracker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - price-tracker-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: price-tracker-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/price-tracker
      REDIS_HOST: redis
      JWT_SECRET: your_jwt_secret_key_here
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    depends_on:
      - mongodb
      - redis
    networks:
      - price-tracker-network
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: price-tracker-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - price-tracker-network
    volumes:
      - ./frontend/src:/app/src

volumes:
  mongo_data:
  redis_data:

networks:
  price-tracker-network:
    driver: bridge
